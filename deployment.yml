apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kubernetes1-statefulset
  labels:
    app: kubernetes1
spec:
  serviceName: kubernetes1-service
  replicas: 3
  selector:
    matchLabels:
      app: kubernetes1
  template:
    metadata:
      labels:
        app: kubernetes1
    spec:
      containers:
      - name: kubernetes1-container
        image: drblaxk/toothiii-website:latest
        ports:
        - containerPort: 80
        env:
        - name: APP_NAME
          value: "kubernetes1"
        - name: ENV
          value: "production"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
